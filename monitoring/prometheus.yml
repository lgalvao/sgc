global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: sgc
    metrics_path: /actuator/prometheus
    # Autenticação: o endpoint /actuator/prometheus exige perfil ADMIN.
    # Coloque o token JWT em monitoring/sgc-token (sem quebra de linha).
    # Exemplo: echo -n "<token>" > monitoring/sgc-token
    authorization:
      credentials_file: /etc/prometheus/sgc-token
    static_configs:
      - targets:
          - sgc:10000
        labels:
          aplicacao: sgc
          ambiente: hom
