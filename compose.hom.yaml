services:
  sgc:
    image: ${SGC_IMAGE:-registry.tre-pe.gov.br/sesel/sgc:latest}
    container_name: sgc
    restart: unless-stopped
    ports:
      - "${PORTA_HOST:-8980}:${PORTA_CONTAINER:-10000}"
    env_file:
      - .env.hom
    environment:
      TZ: America/Recife
      SPRING_PROFILES_ACTIVE: hom
      SERVER_PORT: "${PORTA_CONTAINER:-10000}"
      DB_URL: "${DB_URL:-jdbc:oracle:thin:@desenvolvimentobd.tre-pe.gov.br:1521:admdes2}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      LOGGING_FILE_NAME: /var/log/sgc/sgc.log
    volumes:
      - log-data:/var/log/sgc
      - feedback-data:/feedbacks/screenshots

volumes:
  log-data:
  feedback-data:
