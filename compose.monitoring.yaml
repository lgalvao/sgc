# Stack de monitoramento: Prometheus + Grafana
#
# Uso:
#   docker compose -f compose.hom.yaml -f compose.monitoring.yaml up -d
#
# Pré-requisito: o SGC deve estar rodando com perfil hom e com o endpoint
# /actuator/prometheus habilitado (comportamento padrão em hom).
#
# Autenticação do Prometheus:
#   O endpoint /actuator/prometheus exige autenticação com perfil ADMIN.
#   Opções:
#     1. Gere um token JWT via POST /api/usuarios/login com um usuário ADMIN.
#     2. Coloque o token no arquivo monitoring/sgc-token (sem quebra de linha).
#     3. O Prometheus usará esse token como Bearer nos scrapes.
#
#   Exemplo:
#     echo -n "<seu-token-jwt>" > monitoring/sgc-token
#
# Acesso:
#   - Grafana:    http://localhost:3000  (admin / admin)
#   - Prometheus: http://localhost:9090

services:
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: sgc-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/sgc-token:/etc/prometheus/sgc-token:ro
      - prometheus-data:/prometheus
    networks:
      - sgc-monitoring

  grafana:
    image: grafana/grafana:12.0.1
    container_name: sgc-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - sgc-monitoring

volumes:
  prometheus-data:
  grafana-data:

networks:
  sgc-monitoring:
    external: true
    name: sgc_default
