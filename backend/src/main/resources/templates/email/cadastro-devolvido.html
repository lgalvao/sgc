<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{email/_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1 th:text="${titulo}">Cadastro devolvido para Ajustes</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p>O cadastro de atividades da sua unidade foi devolvido para ajustes.</p>
        <div class="highlight-box">
            <p style="margin: 5px 0;"><strong>Unidade:</strong> <span th:text="${nomeUnidade}"></span></p>
            <p style="margin: 5px 0;"><strong>Processo:</strong> <span th:text="${nomeProcesso}"></span></p>
        </div>
        <div class="highlight-box">
            <p style="margin: 5px 0;"><strong>Motivo da devolução:</strong></p>
            <p style="margin: 10px 0;" th:text="${motivo}"></p>
            <p style="margin: 15px 0 5px 0;"><strong>Observações do analista:</strong></p>
            <p style="margin: 10px 0;" th:text="${observacoes}"></p>
        </div>
        <p><strong>Próximos passos:</strong></p>
        <ul>
            <li>Realize os ajustes solicitados</li>
            <li>Disponibilize novamente o cadastro para análise</li>
        </ul>
        <p style="margin-top: 20px;">
            <a href="https://sgc.tre-pe.jus.br" class="btn">
                Ajustar cadastro
            </a>
        </p>
    </th:block>
</th:block>
</body>
</html>
