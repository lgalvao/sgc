<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1>Cadastro de atividades e conhecimentos devolvido para ajustes</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p>Prezado(a) responsável pela <strong th:text="${siglaUnidadeDestino}">UNIDADE</strong>,</p>

        <p>
            O cadastro de atividades e conhecimentos da <strong th:text="${siglaUnidade}">UNIDADE</strong> no processo
            <strong th:text="${nomeProcesso}">PROCESSO</strong> foi devolvido para ajustes.
        </p>

        <th:block th:replace="~{fragments/texto-complementar :: textoComplementar}"/>
        <p>
            Acompanhe o processo no Sistema de Gestão de Competências:
            <a href="https://sgc.tre-pe.jus.br">https://sgc.tre-pe.jus.br</a>.
        </p>
    </th:block>
</th:block>
</body>
</html>
