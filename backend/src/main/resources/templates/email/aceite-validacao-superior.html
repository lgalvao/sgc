<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{email/_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1>Validação do mapa aceita - Unidade subordinada</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p>Prezado(a) responsável pela <strong th:text="${siglaUnidadeSuperior}">UNIDADE SUPERIOR</strong>,</p>
<p>Informamos que a validação do mapa de competências da unidade <strong th:text="${siglaUnidade}">UNIDADE</strong> foi
    aceita e submetida para análise no processo
    <strong th:text="${nomeProcesso}">PROCESSO</strong>.</p>
    </th:block>
</th:block>
</body>
</html>
