<!DOCTYPE html>
<html lang="pt-BR" th:fragment="email(cabecalho, conteudo)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <style>
        /*
         * Estilos de conteúdo — serão convertidos para atributos style inline automaticamente
         * pelo InlinerCss antes do envio, garantindo compatibilidade com Gmail e Outlook.
         *
         * Regras preservadas no <style> (não podem ser inlinadas):
         *   - :hover / :focus  → progressive enhancement para clientes modernos
         *   - @media           → responsividade para clientes que suportam
         */

        .content p {
            margin: 0 0 12px;
        }

        .content ul,
        .content ol {
            margin: 0 0 16px;
            padding-left: 22px;
        }

        .content li {
            margin: 0 0 8px;
        }

        .highlight-box {
            margin: 20px 0;
            padding: 16px 18px;
            background-color: #f8fbff;
            border: 1px solid #d9e2ec;
        }

        .highlight-box p {
            margin: 0 0 6px;
        }

        .btn {
            display: inline-block;
            margin-top: 8px;
            padding: 10px 16px;
            background-color: #d9e2ec;
            border: 1px solid #bcccdc;
            color: #102a43 !important;
            font-weight: 700;
            text-decoration: none;
        }

        /* Mantido no <style>: progressive enhancement para clientes modernos */
        .btn:hover,
        .btn:focus {
            background-color: #bcccdc;
        }

        a {
            color: #0b69a3;
        }

        .assinatura-automatica {
            margin-top: 10px;
            font-style: italic;
        }

        /* Responsividade para clientes com suporte a @media */
        @media only screen and (max-width: 640px) {
            .container {
                width: 100% !important;
            }
        }
    </style>
    <title>E-mail SGC</title>
</head>
<!--
  Layout baseado em tabelas para compatibilidade máxima com clientes de e-mail.
  Substitui div+max-width+margin:auto (não funciona no Outlook) por
  table+align="center"+width fixo (suportado universalmente).
-->
<body style="margin:0; padding:0; background-color:#f5f7fa; font-family:Arial,sans-serif; line-height:1.6;">

<!-- Wrapper externo: centraliza o container e aplica o fundo da página -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f5f7fa"
       style="width:100%; background-color:#f5f7fa; border-collapse:collapse; mso-table-lspace:0; mso-table-rspace:0;">
    <tr>
        <td align="center" style="padding:24px 16px;">

            <!-- Container principal (640px) — usa width fixo + align para Outlook -->
            <table role="presentation" class="container" align="center" width="640" cellpadding="0" cellspacing="0" border="0"
                   style="width:640px; background-color:#ffffff; border:1px solid #d9e2ec; border-collapse:collapse; mso-table-lspace:0; mso-table-rspace:0;">

                <!-- Área de conteúdo -->
                <tr>
                    <td class="content" valign="top"
                        style="padding:24px; color:#1f2933; font-family:Arial,sans-serif; font-size:14px; line-height:1.6;">
                        <th:block th:replace="${conteudo}"/>
                    </td>
                </tr>

                <!-- Rodapé -->
                <tr>
                    <td style="padding:16px 24px 24px; border-top:1px solid #d9e2ec; background-color:#fafbfc; color:#52606d; font-size:12px; text-align:left;">
                        <p style="margin:4px 0;"><strong>Sistema de Gestão de Competências - SGC</strong></p>
                        <p style="margin:4px 0;">TRE-PE - Tribunal Regional Eleitoral de Pernambuco</p>
                        <p class="assinatura-automatica" style="margin:10px 0 0; font-style:italic;">Este é um e-mail automático. Não responda.</p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
