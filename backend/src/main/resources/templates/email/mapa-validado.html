<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1 th:text="${titulo}">Mapa de Competências validado</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p>O mapa de Competências foi validado pela unidade.</p>
        <div class="highlight-box">
            <p style="margin: 5px 0;"><strong>Unidade:</strong> <span th:text="${nomeUnidade}"></span></p>
            <p style="margin: 5px 0;"><strong>Processo:</strong> <span th:text="${nomeProcesso}"></span></p>
            <p style="margin: 5px 0;"><strong>Status:</strong> Validado ✓</p>
        </div>
        <p>O mapa foi aceito e está pronto para ser publicado.</p>
        <p style="margin-top: 20px;">
            <a href="https://sgc.tre-pe.jus.br" class="btn">
                Visualizar mapa
            </a>
        </p>
    </th:block>
</th:block>
</body>
</html>
