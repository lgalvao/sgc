<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1>Diagnóstico concluído</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p>Prezado(a) responsável pela <strong th:text="${siglaUnidade}">UNIDADE</strong>,</p>

        <p>
            O diagnóstico da unidade <strong th:text="${siglaUnidadeSubordinada}">UNIDADE SUBORDINADA</strong>
            no processo <strong th:text="${nomeProcesso}">PROCESSO</strong>
            foi concluído e submetido à análise da sua unidade.
        </p>

        <th:block th:replace="~{fragments :: textoComplementar}"/>
        <p>
            Realize a análise acessando o Sistema de Gestão de Competências (SGC):
            <a th:href="${urlSistema}" th:text="${urlSistema}">URL</a>.
        </p>
    </th:block>
</th:block>
</body>
</html>
