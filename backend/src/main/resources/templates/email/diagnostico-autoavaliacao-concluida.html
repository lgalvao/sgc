<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1>Autoavaliação concluída</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p>Prezado(a) responsável pela <strong th:text="${siglaUnidade}">UNIDADE</strong>,</p>

        <p>
            O servidor <strong th:text="${nomeServidor}">SERVIDOR</strong> concluiu a autoavaliação no processo
            <strong th:text="${nomeProcesso}">PROCESSO</strong> para análise.
        </p>
    </th:block>
</th:block>
</body>
</html>
