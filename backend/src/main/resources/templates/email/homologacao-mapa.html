<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1>Mapa de Competências homologado</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p>Prezado(a) responsável,</p>

        <p>O mapa de competências do processo <strong th:text="${nomeProcesso}">NOME_PROCESSO</strong> foi homologado.</p>

        <div class="highlight-box">
            <p><strong>Processo:</strong> <span th:text="${nomeProcesso}">NOME_PROCESSO</span></p>
            <p><strong>Status:</strong> Homologado ✓</p>
        </div>

        <p>O mapa de competências está agora oficialmente aprovado e pode ser utilizado.</p>

        <p style="margin-top: 20px;">
            <a class="btn" href="https://sgc.tre-pe.jus.br">
                Acessar o Sistema
            </a>
        </p>
    </th:block>
</th:block>
</body>
</html>
