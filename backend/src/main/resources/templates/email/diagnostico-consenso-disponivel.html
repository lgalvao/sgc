<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1>Avaliação de consenso criada</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p>Prezado(a) <strong th:text="${nomeServidor}">SERVIDOR</strong>,</p>

        <p>
            O responsável pela sua unidade concluiu a avaliação de consenso no processo
            <strong th:text="${nomeProcesso}">PROCESSO</strong>.
        </p>

        <p>
            A aprovação dessa avaliação pode ser realizada no Sistema de Gestão de Competências (SGC):
            <a th:href="${urlSistema}" th:text="${urlSistema}">URL</a>.
        </p>
    </th:block>
</th:block>
</body>
</html>
