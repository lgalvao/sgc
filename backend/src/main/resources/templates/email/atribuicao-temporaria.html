<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1 th:text="${titulo}">Atribuição temporária</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p th:text="'Prezado(a) ' + ${nomeServidor} + ','">Prezado(a),</p>

        <p>
            Foi registrada uma atribuição temporária de perfil de CHEFE para você na unidade
            <strong th:text="${siglaUnidade}">UNIDADE</strong>.
        </p>

        <p>
            <strong>Período:</strong>
            <span th:text="${dataInicio}">01/01/2026</span>
            a
            <span th:text="${dataTermino}">31/01/2026</span>.
        </p>

        <p>
            <strong>Justificativa:</strong>
            <span th:text="${justificativa}">Justificativa</span>.
        </p>

        <p>
            Acesse o sistema em <a th:href="${urlSistema}" th:text="${urlSistema}">https://sgc.tre-pe.jus.br</a>
            e escolha o perfil <strong>CHEFE</strong> para a unidade da atribuição.
        </p>
    </th:block>
</th:block>
</body>
</html>
