<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1>Diagnóstico devolvido para ajustes</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p>Prezado(a) responsável pela <strong th:text="${siglaUnidade}">UNIDADE</strong>,</p>

        <p>
            O diagnóstico da unidade <strong th:text="${siglaUnidade}">UNIDADE</strong> no processo
            <strong th:text="${nomeProcesso}">PROCESSO</strong> foi devolvido para ajustes.
        </p>

        <p th:if="${observacoes != null}">
            <strong>Observações da análise:</strong>
            <span th:text="${observacoes}">Observações</span>
        </p>
    </th:block>
</th:block>
</body>
</html>
