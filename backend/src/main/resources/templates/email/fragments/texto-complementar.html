<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="textoComplementar">
    <p th:if="${textoComplementar != null and !#strings.isEmpty(textoComplementar)}">
        <strong th:text="${rotuloTextoComplementar + ':'}">Observações:</strong>
        <span th:utext="${textoComplementar}">Texto complementar</span>
    </p>
</th:block>
</body>
</html>
