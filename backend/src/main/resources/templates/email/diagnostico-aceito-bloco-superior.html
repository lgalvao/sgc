<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1>Diagnósticos submetidos para análise</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p>Prezado(a) responsável pela <strong th:text="${siglaUnidadeSuperior}">UNIDADE SUPERIOR</strong>,</p>

        <p>
            Os diagnósticos das unidades
            <strong th:text="${#strings.listJoin(siglasUnidades, ', ')}">UNIDADES</strong>
            no processo <strong th:text="${nomeProcesso}">PROCESSO</strong> foram submetidos para análise.
        </p>
    </th:block>
</th:block>
</body>
</html>
