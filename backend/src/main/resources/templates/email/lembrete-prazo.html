<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{email/_layout :: email(cabecalho=~{::cabecalho}, conteudo=~{::conteudo})}">
    <th:block th:fragment="cabecalho">
        <h1 th:text="${titulo}">Lembrete de Prazo</h1>
    </th:block>
    <th:block th:fragment="conteudo">
        <p>Prezado(a) responsável pela <strong th:text="${siglaUnidade}"></strong>,</p>
        <p>Este é um lembrete de que o prazo para a conclusão da etapa atual do processo <strong
                th:text="${nomeProcesso}"></strong> encerra em <strong th:text="${dataLimite}"></strong>.</p>

        <p>Acesse o sistema para concluir suas pendências:</p>

        <p style="margin-top: 20px;">
            <a href="https://sgc.tre-pe.jus.br" class="btn">
                Acessar painel
            </a>
        </p>
    </th:block>
</th:block>
</body>
</html>
